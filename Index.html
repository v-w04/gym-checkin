<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GYM CHECK-IN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas:          #181818;
    --canvas-elevated: #303030;
    --primary:         #da291c;
    --primary-active:  #b01e0a;
    --ink:             #ffffff;
    --body-color:      #969696;
    --muted:           #666666;
    --hairline:        #303030;
    --on-primary:      #ffffff;
    --success:         #03904a;
    --warning-color:   #f13a2c;

    --sp-xxs: 8px;
    --sp-xs:  16px;
    --sp-sm:  24px;
    --sp-md:  32px;
    --sp-lg:  48px;
    --sp-xl:  64px;
    --sp-xxl: 96px;

    --font: 'Inter', -apple-system, system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--canvas); color: var(--ink); font-family: var(--font); -webkit-font-smoothing: antialiased; }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    width: 100%;
    height: 52vh;
    min-height: 280px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .hero-bg {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #0e0b0b 0%, #1e0f0c 40%, #241210 70%, #181818 100%);
  }

  .hero-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      -55deg, transparent, transparent 48px,
      rgba(255,255,255,0.013) 48px, rgba(255,255,255,0.013) 49px
    );
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -80px;
    width: 600px; height: 500px;
    background: radial-gradient(ellipse, rgba(218,41,28,0.22) 0%, transparent 62%);
  }

  .hero-number {
    position: absolute;
    top: 50%; right: -8px;
    transform: translateY(-55%);
    font-size: clamp(120px, 28vw, 320px);
    font-weight: 700;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(218,41,28,0.12);
    letter-spacing: -0.04em;
    pointer-events: none;
    user-select: none;
    z-index: 1;
  }

  .nav {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--sp-md);
    z-index: 10;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .nav-left { display: flex; align-items: center; gap: var(--sp-xxs); }

  .nav-icon {
    width: 28px; height: 28px;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .nav-brand {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--ink);
  }

  .nav-tag {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.1px; text-transform: uppercase;
    color: var(--muted);
  }

  .hero-copy {
    position: relative; z-index: 5;
    padding: var(--sp-lg) var(--sp-md) var(--sp-md);
  }

  .hero-eyebrow {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.1px; text-transform: uppercase;
    color: var(--primary); margin-bottom: var(--sp-xxs);
  }

  .hero-h1 {
    font-size: clamp(32px, 7vw, 56px);
    font-weight: 500; line-height: 1.05;
    letter-spacing: -0.02em; color: var(--ink);
  }

  .hero-line {
    position: absolute;
    left: var(--sp-md); bottom: 0;
    width: 1px; height: 48px;
    background: linear-gradient(180deg, var(--primary), transparent);
    z-index: 5;
  }

  /* ─── MAIN ─── */
  .main {
    background: var(--canvas);
    padding: var(--sp-md) var(--sp-md) var(--sp-xl);
    position: relative;
  }

  .main-accent {
    width: 40px; height: 2px;
    background: var(--primary);
    margin-bottom: var(--sp-md);
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ─── Panel ─── */
  .panel-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.1px; text-transform: uppercase;
    color: var(--muted); margin-bottom: var(--sp-xs);
  }

  .panel {
    background: var(--canvas-elevated);
    border: 1px solid rgba(255,255,255,0.06);
    padding: var(--sp-md);
  }

  /* ─── Input ─── */
  .pin-input {
    width: 100%;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 4px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: var(--font);
    font-size: 22px; font-weight: 500;
    letter-spacing: 5px; text-align: center;
    outline: none;
    transition: border-color 0.15s;
    caret-color: var(--primary);
    -webkit-appearance: none;
  }

  .pin-input::placeholder { color: var(--muted); letter-spacing: 1px; font-size: 13px; }
  .pin-input:focus { border-color: var(--primary); }

  .field-hint {
    font-size: 12px; color: var(--muted);
    text-align: center;
    margin-top: var(--sp-xxs);
    margin-bottom: var(--sp-sm);
    line-height: 1.5;
  }

  /* ─── Botones ─── */
  .btn {
    display: flex; align-items: center; justify-content: center;
    gap: var(--sp-xxs);
    width: 100%; height: 48px;
    padding: 0 var(--sp-md);
    border: none; border-radius: 0;
    font-family: var(--font);
    font-size: 14px; font-weight: 700;
    letter-spacing: 1.4px; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.1s, opacity 0.1s;
  }

  .btn-primary { background: var(--primary); color: var(--on-primary); }
  .btn-primary:active { background: var(--primary-active); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-outline {
    background: transparent; color: var(--ink);
    border: 1px solid rgba(255,255,255,0.18);
    margin-top: var(--sp-xxs);
    font-size: 12px; letter-spacing: 1.1px;
  }

  .btn-outline:active { background: rgba(255,255,255,0.04); }

  /* ─── Empleado ─── */
  .emp-block {
    margin-bottom: var(--sp-md);
    padding-bottom: var(--sp-md);
    border-bottom: 1px solid var(--hairline);
  }

  .emp-greeting {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.1px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 4px;
  }

  .emp-name {
    font-size: clamp(20px, 5vw, 26px);
    font-weight: 500; line-height: 1.2;
    letter-spacing: -0.01em; color: var(--ink);
  }

  /* ─── Resultado ─── */
  .result {
    margin-top: var(--sp-sm);
    padding: var(--sp-xs) var(--sp-sm);
    display: none;
    border-left: 2px solid;
  }

  .result.ok    { border-color: var(--success);        background: rgba(3,144,74,0.07); }
  .result.warn  { border-color: #ffaa33;               background: rgba(255,170,51,0.07); }
  .result.error { border-color: var(--warning-color);  background: rgba(241,58,44,0.07); }

  .result-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.1px; text-transform: uppercase;
    margin-bottom: 4px;
  }

  .result.ok    .result-title { color: #2ec97e; }
  .result.warn  .result-title { color: #ffaa33; }
  .result.error .result-title { color: var(--warning-color); }

  .result-msg { font-size: 13px; color: var(--body-color); line-height: 1.5; }

  /* ─── Spinner ─── */
  .spin {
    width: 14px; height: 14px; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.25);
    border-top-color: var(--on-primary);
    border-radius: 50%;
    animation: rot 0.7s linear infinite;
  }

  @keyframes rot { to { transform: rotate(360deg); } }

  .gps-dot {
    width: 8px; height: 8px; flex-shrink: 0;
    background: var(--on-primary);
    border-radius: 50%; position: relative;
  }

  .gps-dot::before {
    content: '';
    position: absolute; inset: -5px;
    border-radius: 50%;
    border: 1px solid var(--on-primary);
    animation: gps-pulse 1.6s ease-out infinite;
    opacity: 0;
  }

  @keyframes gps-pulse {
    0%   { transform: scale(0.7); opacity: 0.8; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* ─── Footer ─── */
  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: var(--sp-xs) var(--sp-md);
    border-top: 1px solid var(--hairline);
    background: var(--canvas);
    display: flex; align-items: center; justify-content: space-between;
  }

  .footer-text { font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }
  .footer-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }

  /* ─── Desktop split ─── */
  @media (min-width: 1024px) {
    .hero {
      position: fixed; top: 0; left: 0;
      width: 52%; height: 100dvh;
    }

    .hero-number { font-size: clamp(200px, 22vw, 340px); }

    .main {
      margin-left: 52%; min-height: 100dvh;
      display: flex; flex-direction: column; justify-content: center;
      padding: var(--sp-xxl) var(--sp-xl) 100px;
    }

    .main-accent { display: none; }
    .footer { left: 52%; }
    .nav { padding: 0 var(--sp-xl); }
    .hero-copy { padding: var(--sp-xxl) var(--sp-xl) var(--sp-lg); }
    .hero-line { left: var(--sp-xl); }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-number">GYM</div>

  <nav class="nav">
    <div class="nav-left">
      <div class="nav-icon">🏋️</div>
      <span class="nav-brand">Check-in</span>
    </div>
    <span class="nav-tag">Uso interno</span>
  </nav>

  <div class="hero-copy">
    <p class="hero-eyebrow">Registro de asistencia</p>
    <h1 class="hero-h1">GYM<br>CHECK-IN</h1>
  </div>
  <div class="hero-line"></div>
</section>

<main class="main">
  <div class="main-accent"></div>

  <!-- LOGIN -->
  <div id="s-login" class="screen active">
    <div class="panel-label">Identificación</div>
    <div class="panel">
      <input class="pin-input" type="tel" id="pin" maxlength="10"
             placeholder="Ingresa tu PIN" inputmode="numeric" autocomplete="off"
             onkeydown="if(event.key==='Enter') doLogin()">
      <p class="field-hint">PIN = 00 + número de empleado<br>Ej: 001 · 0025 · 0038</p>
      <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Acceder</button>
    </div>
    <div class="result" id="login-err">
      <div class="result-title">Error de acceso</div>
      <div class="result-msg" id="login-err-msg"></div>
    </div>
  </div>

  <!-- HOME -->
  <div id="s-home" class="screen">
    <div class="emp-block">
      <div class="emp-greeting">Empleado verificado</div>
      <div class="emp-name" id="emp-name-display">—</div>
    </div>
    <div class="panel-label">Ubicación GPS</div>
    <div class="panel">
      <button class="btn btn-primary" id="btn-checkin" onclick="doCheckin()">
        <span class="gps-dot"></span>
        Registrar ubicación
      </button>
      <button class="btn btn-outline" onclick="doLogout()">Cerrar sesión</button>
    </div>
    <div class="result" id="checkin-result">
      <div class="result-title" id="cr-title"></div>
      <div class="result-msg" id="cr-msg"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <span class="footer-text">v1.0 &nbsp;·&nbsp; Solo uso interno</span>
  <div class="footer-dot"></div>
</footer>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwOXDMHVLtn9MHEKr3gKZuf_TyPUExLCy5TtEsv9EZvTi9LtzLac-IR7kNj2YEv00oR/exec";
  let session = null, _cbCount = 0;

  function callAPI(action, params = {}) {
    return new Promise((resolve, reject) => {
      const cbName = "_cb" + (++_cbCount);
      const timeout = setTimeout(() => { delete window[cbName]; reject(new Error("Tiempo agotado")); }, 20000);
      window[cbName] = (data) => {
        clearTimeout(timeout); delete window[cbName];
        document.getElementById("jsonp-" + cbName)?.remove();
        resolve(data);
      };
      const tag = document.createElement("script");
      tag.id = "jsonp-" + cbName;
      tag.src = API_URL + "?" + new URLSearchParams({ action, callback: cbName, ...params });
      tag.onerror = () => { clearTimeout(timeout); delete window[cbName]; tag.remove(); reject(new Error("Error de red")); };
      document.head.appendChild(tag);
    });
  }

  async function doLogin() {
    const pin = document.getElementById("pin").value.trim();
    const btn = document.getElementById("btn-login");
    const err = document.getElementById("login-err");
    if (!pin) { showResult(err, "error", "Error de acceso", "Ingresa tu PIN para continuar."); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Verificando...';
    err.style.display = "none";
    try {
      const data = await callAPI("login", { pin });
      if (data.ok) {
        session = data;
        document.getElementById("emp-name-display").textContent = data.nombre;
        document.getElementById("checkin-result").style.display = "none";
        show("s-home");
      } else {
        showResult(err, "error", "Acceso denegado", data.msg);
      }
    } catch(e) { showResult(err, "error", "Sin conexión", e.message); }
    finally { btn.disabled = false; btn.textContent = "Acceder"; }
  }

  async function doCheckin() {
    const btn = document.getElementById("btn-checkin");
    const res = document.getElementById("checkin-result");
    if (!navigator.geolocation) { showResult(res, "error", "GPS no disponible", "Tu dispositivo no soporta geolocalización."); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Obteniendo GPS...';
    res.style.display = "none";
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        btn.innerHTML = '<span class="spin"></span> Guardando...';
        try {
          const data = await callAPI("registrar", { pin: session.pin, lat: pos.coords.latitude, lng: pos.coords.longitude });
          if (data.ok) showResult(res, data.valido ? "ok" : "warn", data.valido ? "Registro exitoso" : "Registrado · Fuera de rango", data.msg);
          else showResult(res, "error", "Error", data.msg);
        } catch(e) { showResult(res, "error", "Error de red", e.message); }
        finally { btn.disabled = false; btn.innerHTML = '<span class="gps-dot"></span> Registrar ubicación'; }
      },
      (err) => {
        btn.disabled = false;
        btn.innerHTML = '<span class="gps-dot"></span> Registrar ubicación';
        const msgs = { 1:"Permiso denegado. Actívalo en tu navegador.", 2:"No se pudo obtener ubicación. Intenta al aire libre.", 3:"Tiempo agotado. Intenta de nuevo." };
        showResult(res, "error", "Error GPS", msgs[err.code] || err.message);
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  function doLogout() {
    session = null;
    document.getElementById("pin").value = "";
    document.getElementById("login-err").style.display = "none";
    show("s-login");
  }

  function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function showResult(el, tipo, title, msg) {
    el.className = "result " + tipo;
    el.querySelector(".result-title").textContent = title;
    el.querySelector(".result-msg").textContent = msg;
    el.style.display = "block";
  }
</script>
</body>
</html>
